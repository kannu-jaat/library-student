name: Build Android APK

# Ye action tab chalega jab aap code push karenge ya manually run karenge
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Aapka code download karega (Updated to v4)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java setup karega (Updated to v4)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Flutter setup karega
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' 
          channel: 'stable'

      # 4. Saare packages download karega
      - name: Get Dependencies
        run: flutter pub get

      # 5. APK build karega
      - name: Build APK
        run: flutter build apk --release

      # 6. APK ko download ke liye save karega (Updated to v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Student-App-Release
          path: build/app/outputs/flutter-apk/app-release.apk
